<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LED Device</title>
  <link rel="icon" href="data:,">

  <link rel="stylesheet" href="styles.css">

  <script type="module" src="main.js"></script>

  <script src="core/AppConstants.js" type="text/javascript" defer></script>
  <script src="modes/BaseMode.js" type="text/javascript" defer></script>
  <script src="modes/Matrix.js" type="text/javascript" defer></script>
  <script src="core/MultiKeyHandler.js" type="text/javascript" defer></script>
  <script src="core/UserLogic.js" type="text/javascript" defer></script>
  <script src="modes/Snake.js" type="text/javascript" defer></script>
  <script src="modes/Tetris.js" type="text/javascript" defer></script>
  <script src="core/nrf24l01.js" type="text/javascript" defer></script>
  <script src="script.js" type="text/javascript" defer></script>
  <script src="modes/orbitEditor.js" type="text/javascript" defer></script>


</head>
<body>
  <main class="app-shell">
    <section class="app-card">
      <div class="device-stage">
        <div class="orbit-scene">
          <div class="orbit-ring"></div>
          <span class="orbit-dot" style="--start: 0deg; --delay: -1s;"><span class="orbit-dot-label">+</span></span>
          <span class="orbit-dot" style="--start: 60deg; --delay: -3s;"><span class="orbit-dot-label">+</span></span>
          <span class="orbit-dot" style="--start: 120deg; --delay: -5s;"><span class="orbit-dot-label">+</span></span>
          <span class="orbit-dot" style="--start: 180deg; --delay: -7s;"><span class="orbit-dot-label">+</span></span>
          <span class="orbit-dot" style="--start: 240deg; --delay: -9s;"><span class="orbit-dot-label">+</span></span>
          <span class="orbit-dot" style="--start: 300deg; --delay: -11s;"><span class="orbit-dot-label">+</span></span>
        </div>
        <div class="device-with-buttons">
          <div id="device">
            <div id="matrix-host"></div>
          </div>
        </div>

        <form id="orbit-editor" class="orbit-editor" aria-label="Temperature editor">
          <label for="orbit-sensor-type">Sensor type</label>
          <select id="orbit-sensor-type">
            <option value="DS18B20">DS18B20</option>
            <option value="DHT11">DHT11</option>
            <option value="DHT22">DHT22</option>
          </select>

          <label for="orbit-temp-input">Temperature, °C</label>
          <input id="orbit-temp-input" type="number" step="0.1" min="-55" max="125" placeholder="For example, 23.5" />

          <div id="orbit-humidity-wrap">
            <label for="orbit-humidity-input">Humidity, %</label>
            <input id="orbit-humidity-input" type="number" step="0.1" min="0" max="100" placeholder="Default: 50" />
          </div>

          <div class="orbit-editor-actions">
            <button id="orbit-save" type="submit">Save</button>
            <button id="orbit-delete" type="button">Delete</button>
            <button id="orbit-cancel" type="button">Cancel</button>
          </div>
        </form>
      </div>
    </section>
  </main>

</body>
</html>
