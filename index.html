<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LED Snake + Tetris</title>
  <style>
    :root {
      --bg: #070707;
      --frame: #111111;
      --off-led: #d9d9d9;
      --on-led: #ff2d2d;
      --text: #f2f2f2;
      --food: #ff2d2d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 50% 30%, #1b1b1b 0%, var(--bg) 60%);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    .games {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
      padding: 20px;
    }

    .panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 16px;
      background: #0e0e0e;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.45);
    }

    .title {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0.04em;
      font-weight: 600;
      text-transform: uppercase;
    }

    .stats {
      width: 100%;
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      opacity: 0.95;
    }

    canvas {
      display: block;
      background: #000;
      border: 2px solid var(--frame);
      border-radius: 8px;
      image-rendering: pixelated;
    }

    .hint {
      margin: 0;
      font-size: 13px;
      text-align: center;
      max-width: 360px;
      color: #d3d3d3;
    }

    .controls {
      display: flex;
      gap: 8px;
    }

    button {
      border: 1px solid #3d3d3d;
      background: #1a1a1a;
      color: #f0f0f0;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
    }

    button:hover {
      background: #232323;
    }
  </style>
</head>

<body>
  <main class="games">
    <section class="panel">
      <h1 class="title">LED Matrix 16x8 Snake</h1>
      <div class="stats">
        <span id="score">Счёт: 0</span>
        <span id="state">Игра</span>
      </div>
      <canvas id="matrix" width="640" height="320" aria-label="LED matrix 16x8"></canvas>
      <div class="controls">
        <button id="restartBtn" type="button">Перезапуск</button>
        <button id="pauseBtn" type="button">Пауза</button>
        <button id="autoBtn" type="button">Авто: выкл</button>
      </div>
      <p class="hint">Snake: Left/A - влево, Right/D - вправо, Down/S (удерживать) - ускорение. Пробел - пауза, M - автопилот.</p>
    </section>

    <section class="panel">
      <h1 class="title">LED Tetris</h1>
      <div class="stats">
        <span id="tetrisScore">Очки: 0</span>
        <span id="tetrisState">Игра</span>
      </div>
      <div class="stats">
        <span id="tetrisLines">Линии: 0</span>
        <span id="tetrisLevel">Уровень: 1</span>
      </div>
      <canvas id="tetrisMatrix" width="260" height="500" aria-label="LED tetris 8x16"></canvas>
      <div class="controls">
        <button id="tetrisRestartBtn" type="button">Перезапуск</button>
        <button id="tetrisPauseBtn" type="button">Пауза</button>
      </div>
      <p class="hint">Tetris 8x16, только 3 кнопки: Left - влево, Right - вправо, Down: коротко поворот, удержание ускорение вниз.</p>
    </section>
  </main>

  <script src="snake.js"></script>
  <script src="tetris.js"></script>
</body>

</html>
