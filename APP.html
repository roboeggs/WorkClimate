<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LED Device</title>
  <link rel="icon" href="data:,">

  <link rel="stylesheet" href="styles.css">
  <script src="libraries/p5.min.js" type="text/javascript"></script>
  <script src="AppConstants.js" type="text/javascript"></script>
  <script src="BaseMode.js" type="text/javascript"></script>
  <script src="Matrix.js" type="text/javascript"></script>
  <script src="MultiKeyHandler.js" type="text/javascript"></script>
  <script src="UserLogic.js" type="text/javascript"></script>
  <script src="MyTetris.js" type="text/javascript"></script>
  <script src="script.js" type="text/javascript"></script>
</head>
<body>
  <main class="app-shell">
    <section class="app-card">
      <div class="device-stage">
        <div class="orbit-scene" aria-hidden="true">
          <div class="orbit-ring"></div>
          <span class="orbit-dot" style="--start: 0deg; --delay: -1s;">+</span>
          <span class="orbit-dot" style="--start: 72deg; --delay: -3s;">+</span>
          <span class="orbit-dot" style="--start: 144deg; --delay: -5s;">+</span>
          <span class="orbit-dot" style="--start: 216deg; --delay: -7s;">+</span>
          <span class="orbit-dot" style="--start: 288deg; --delay: -9s;">+</span>
        </div>
        <div class="device-with-buttons">
          <div id="device">
            <div id="matrix-host"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

</body>
</html>
